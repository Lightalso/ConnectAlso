name: Fuzz

on:
  schedule:
    - cron: '0 8 * * 1'

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz-relay-proto:
    name: Fuzz relay-proto
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz
      - run: |
          cd crates/relay-proto
          cargo fuzz run fuzz_frame_decode -- -max_total_time=600
          cargo fuzz run fuzz_frame_roundtrip -- -max_total_time=120

  fuzz-nat:
    name: Fuzz NAT/STUN
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz
      - run: |
          cd crates/nat
          cargo fuzz run fuzz_stun_parse -- -max_total_time=600
