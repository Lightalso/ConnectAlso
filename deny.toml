[licenses]
# 允许的许可证（全部与 GPLv3 兼容）
# 未列出的许可证将被拒绝
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
]

# 许可证例外
exceptions = [
    # tun2 使用 WTFPL，FSF 认为 GPL 兼容
    # M2 后评估替代方案
    { name = "tun2", allow = ["WTFPL"] },
]

[bans]
# 禁止同一 crate 的多个版本
multiple-versions = "deny"
# 禁止通配符依赖
wildcards = "deny"

[sources]
# 只允许 crates.io
unknown-registry = "deny"
unknown-git = "deny"
